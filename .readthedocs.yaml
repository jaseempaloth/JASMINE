# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.9"
  jobs:
    post_create_environment:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
    pre_install:
      - VIRTUAL_ENV="$READTHEDOCS_VIRTUALENV_PATH" ~/.local/bin/uv sync --active --group docs

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false  # Set to false initially to avoid build failures

# Optionally build your docs in additional formats such as PDF
formats:
  - pdf
  - htmlzip

# Dependencies are installed via uv in build.jobs.pre_install.
